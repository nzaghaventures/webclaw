<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebClaw Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #FF4D4D;
      --bg: #f8f9fa;
      --card: #ffffff;
      --text: #202124;
      --text-secondary: #5f6368;
      --border: #dadce0;
      --success: #00E676;
      --danger: #FF4757;
      --warning: #FFB800;
    }
    body {
      font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 260px; background: var(--card); border-right: 1px solid var(--border);
      padding: 24px 16px; flex-shrink: 0;
    }
    .sidebar h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; color: var(--primary); }
    .sidebar p { font-size: 12px; color: var(--text-secondary); margin-bottom: 24px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px; cursor: pointer;
      font-size: 14px; color: var(--text-secondary); transition: all 0.15s;
      margin-bottom: 2px;
    }
    .nav-item:hover { background: #f1f3f4; color: var(--text); }
    .nav-item.active { background: #fee8e8; color: var(--primary); font-weight: 500; }
    .nav-item .icon { width: 20px; text-align: center; }
    .main { flex: 1; padding: 32px; max-width: 960px; }
    .main h2 { font-size: 24px; font-weight: 500; margin-bottom: 24px; }

    /* Cards */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px; margin-bottom: 16px;
    }
    .card h3 { font-size: 16px; font-weight: 500; margin-bottom: 12px; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; text-align: center;
    }
    .stat-card .value { font-size: 32px; font-weight: 600; color: var(--primary); }
    .stat-card .label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

    /* Forms */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text-secondary); }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 14px; font-family: inherit;
      transition: border-color 0.15s;
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.1);
    }
    .form-group textarea { min-height: 100px; resize: vertical; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500;
      cursor: pointer; border: none; transition: all 0.15s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #CC2A2A; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #991B1B; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { background: #f1f3f4; }
    .btn-sm { padding: 6px 14px; font-size: 13px; }

    /* Table */
    .table { width: 100%; border-collapse: collapse; }
    .table th, .table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
    .table th { font-weight: 500; color: var(--text-secondary); font-size: 13px; }
    .table tr:hover { background: #f8f9fa; }

    /* Badges */
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 12px;
      font-size: 12px; font-weight: 500;
    }
    .badge-success { background: #e6f9f0; color: var(--success); }
    .badge-warning { background: #fef7e0; color: #e37400; }

    /* Code block for embed snippet */
    .code-block {
      background: #1e1e1e; color: #d4d4d4; padding: 16px; border-radius: 8px;
      font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px;
      overflow-x: auto; position: relative;
    }
    .code-block .copy-btn {
      position: absolute; top: 8px; right: 8px;
      padding: 4px 10px; border-radius: 4px; background: #333;
      color: #aaa; border: none; cursor: pointer; font-size: 12px;
    }
    .code-block .copy-btn:hover { background: #444; color: white; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 12px 20px; border-radius: 8px; font-size: 14px;
      color: white; transform: translateY(100px); opacity: 0;
      transition: all 0.3s ease; z-index: 9999;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast-success { background: var(--success); }
    .toast-error { background: var(--danger); }

    /* Tabs */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .tab {
      padding: 10px 20px; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent;
      color: var(--text-secondary); transition: all 0.15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 500; }

    .hidden { display: none !important; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <div class="sidebar">
      <h1>🦀 WebClaw</h1>
      <p>Site Owner Dashboard</p>
      <div class="nav-item active" data-page="overview">
        <span class="icon">📊</span> Overview
      </div>
      <div class="nav-item" data-page="sites">
        <span class="icon">🌐</span> Sites
      </div>
      <div class="nav-item" data-page="knowledge">
        <span class="icon">📚</span> Knowledge Base
      </div>
      <div class="nav-item" data-page="sessions">
        <span class="icon">💬</span> Sessions
      </div>
      <div class="nav-item" data-page="settings">
        <span class="icon">⚙️</span> Settings
      </div>
    </div>

    <!-- Main Content -->
    <div class="main" id="main-content">
      <!-- Pages rendered by JS -->
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = window.location.origin;
    let currentSite = null;
    let sites = [];

    // ========================================
    // API
    // ========================================

    async function api(path, opts = {}) {
      const res = await fetch(`${API_BASE}${path}`, {
        headers: { 'Content-Type': 'application/json' },
        ...opts,
        body: opts.body ? JSON.stringify(opts.body) : undefined,
      });
      return res.json();
    }

    // ========================================
    // Toast
    // ========================================

    function toast(msg, type = 'success') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `toast toast-${type} show`;
      setTimeout(() => el.classList.remove('show'), 3000);
    }

    // ========================================
    // Navigation
    // ========================================

    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        item.classList.add('active');
        renderPage(item.dataset.page);
      });
    });

    // ========================================
    // Pages
    // ========================================

    async function renderPage(page) {
      const main = document.getElementById('main-content');
      switch (page) {
        case 'overview': return renderOverview(main);
        case 'sites': return renderSites(main);
        case 'knowledge': return renderKnowledge(main);
        case 'sessions': return renderSessions(main);
        case 'settings': return renderSettings(main);
      }
    }

    async function renderOverview(el) {
      const data = await api('/api/sites');
      sites = data.sites || [];

      const totalSites = sites.length;

      el.innerHTML = `
        <h2>Overview</h2>
        <div class="stat-grid">
          <div class="stat-card">
            <div class="value">${totalSites}</div>
            <div class="label">Registered Sites</div>
          </div>
          <div class="stat-card">
            <div class="value" id="stat-sessions">-</div>
            <div class="label">Total Sessions</div>
          </div>
          <div class="stat-card">
            <div class="value" id="stat-messages">-</div>
            <div class="label">Messages</div>
          </div>
          <div class="stat-card">
            <div class="value" id="stat-actions">-</div>
            <div class="label">Actions Executed</div>
          </div>
        </div>

        <div class="card">
          <h3>Your Sites</h3>
          ${sites.length === 0 ? '<p style="color:var(--text-secondary)">No sites registered yet. Go to Sites to add one.</p>' : `
          <table class="table">
            <thead>
              <tr><th>Site ID</th><th>Domain</th><th>Persona</th><th>Actions</th></tr>
            </thead>
            <tbody>
              ${sites.map(s => `
                <tr>
                  <td><code>${s.site_id}</code></td>
                  <td>${s.domain}</td>
                  <td>${s.persona_name}</td>
                  <td>
                    <button class="btn btn-sm btn-outline" onclick="editSite('${s.site_id}')">Edit</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>`}
        </div>

        <div class="card">
          <h3>Quick Integration</h3>
          <p style="font-size:14px;color:var(--text-secondary);margin-bottom:12px">
            Add this script tag to your website to enable WebClaw:
          </p>
          <div class="code-block">
            <button class="copy-btn" onclick="copySnippet()">Copy</button>
            <pre>&lt;script src="${API_BASE}/embed.js"
        data-site-id="${sites[0]?.site_id || 'YOUR_SITE_ID'}"
        data-gateway="${API_BASE}"&gt;
&lt;/script&gt;</pre>
          </div>
        </div>
      `;

      // Load stats for first site
      if (sites.length > 0) {
        const stats = await api(`/api/sites/${sites[0].site_id}/stats`);
        const s = stats.stats || {};
        document.getElementById('stat-sessions').textContent = s.sessions_total || '0';
        document.getElementById('stat-messages').textContent = s.messages_text || '0';
        document.getElementById('stat-actions').textContent = s.actions_executed || '0';
      }
    }

    async function renderSites(el) {
      const data = await api('/api/sites');
      sites = data.sites || [];

      el.innerHTML = `
        <div class="flex-between">
          <h2>Sites</h2>
          <button class="btn btn-primary" onclick="showCreateSite()">+ Add Site</button>
        </div>
        <div id="sites-list">
          ${sites.map(s => `
            <div class="card">
              <div class="flex-between">
                <h3>${s.persona_name} <span class="badge badge-success">Active</span></h3>
                <div style="display:flex;gap:8px">
                  <button class="btn btn-sm btn-outline" onclick="editSite('${s.site_id}')">Edit</button>
                  ${s.site_id !== 'demo' ? `<button class="btn btn-sm btn-danger" onclick="deleteSite('${s.site_id}')">Delete</button>` : ''}
                </div>
              </div>
              <p style="font-size:13px;color:var(--text-secondary);margin-top:8px">
                <strong>ID:</strong> <code>${s.site_id}</code> &middot;
                <strong>Domain:</strong> ${s.domain} &middot;
                <strong>Actions:</strong> ${(s.allowed_actions || []).length} allowed
              </p>
            </div>
          `).join('')}
        </div>
        <div id="site-form" class="card hidden"></div>
      `;
    }

    function showCreateSite() {
      showSiteForm();
    }

    async function editSite(siteId) {
      const data = await api(`/api/sites/${siteId}`);
      if (data.config) {
        currentSite = data.config;
        // Navigate to sites page if not already there
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelector('[data-page="sites"]').classList.add('active');
        await renderSites(document.getElementById('main-content'));
        showSiteForm(data.config);
      }
    }

    function showSiteForm(config = null) {
      const form = document.getElementById('site-form');
      form.classList.remove('hidden');
      const isEdit = !!config;
      const allActions = ['click', 'type', 'scroll', 'navigate', 'highlight', 'read', 'select', 'check'];
      const allowed = config?.allowed_actions || allActions;

      form.innerHTML = `
        <h3>${isEdit ? 'Edit Site' : 'Add New Site'}</h3>
        <div class="form-group">
          <label>Domain</label>
          <input id="f-domain" value="${config?.domain || ''}" placeholder="yoursite.com" />
        </div>
        <div class="form-group">
          <label>Persona Name</label>
          <input id="f-name" value="${config?.persona_name || 'WebClaw'}" />
        </div>
        <div class="form-group">
          <label>Voice Style</label>
          <input id="f-voice" value="${config?.persona_voice || 'friendly and helpful'}" placeholder="e.g., warm, professional, concise" />
        </div>
        <div class="form-group">
          <label>Welcome Message</label>
          <input id="f-welcome" value="${config?.welcome_message || ''}" />
        </div>
        <div class="form-group">
          <label>Knowledge Base</label>
          <textarea id="f-kb" placeholder="Add FAQs, product info, policies...">${config?.knowledge_base || ''}</textarea>
        </div>
        <div class="form-group">
          <label>Escalation Email</label>
          <input id="f-email" type="email" value="${config?.escalation_email || ''}" placeholder="support@yoursite.com" />
        </div>
        <div class="form-group">
          <label>Allowed Actions</label>
          <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px">
            ${allActions.map(a => `
              <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer">
                <input type="checkbox" class="action-cb" value="${a}" ${allowed.includes(a) ? 'checked' : ''} />
                ${a}
              </label>
            `).join('')}
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:16px">
          <button class="btn btn-primary" onclick="saveSite('${config?.site_id || ''}')">${isEdit ? 'Update' : 'Create'}</button>
          <button class="btn btn-outline" onclick="document.getElementById('site-form').classList.add('hidden')">Cancel</button>
        </div>
      `;
      form.scrollIntoView({ behavior: 'smooth' });
    }

    async function saveSite(siteId) {
      const body = {
        domain: document.getElementById('f-domain').value,
        persona_name: document.getElementById('f-name').value,
        persona_voice: document.getElementById('f-voice').value,
        welcome_message: document.getElementById('f-welcome').value,
        knowledge_base: document.getElementById('f-kb').value,
        escalation_email: document.getElementById('f-email').value,
        allowed_actions: [...document.querySelectorAll('.action-cb:checked')].map(cb => cb.value),
        restricted_actions: [...document.querySelectorAll('.action-cb:not(:checked)')].map(cb => cb.value),
      };

      if (siteId) {
        await api(`/api/sites/${siteId}`, { method: 'PUT', body });
        toast('Site updated');
      } else {
        await api('/api/sites', { method: 'POST', body });
        toast('Site created');
      }
      renderSites(document.getElementById('main-content'));
    }

    async function deleteSite(siteId) {
      if (!confirm(`Delete site ${siteId}? This cannot be undone.`)) return;
      await api(`/api/sites/${siteId}`, { method: 'DELETE' });
      toast('Site deleted');
      renderSites(document.getElementById('main-content'));
    }

    // ========================================
    // Knowledge Base
    // ========================================

    async function renderKnowledge(el) {
      const data = await api('/api/sites');
      sites = data.sites || [];

      if (sites.length === 0) {
        el.innerHTML = '<h2>Knowledge Base</h2><p>Register a site first.</p>';
        return;
      }

      const siteId = currentSite?.site_id || sites[0].site_id;
      const docs = await api(`/api/sites/${siteId}/knowledge`);

      el.innerHTML = `
        <div class="flex-between">
          <h2>Knowledge Base</h2>
          <div style="display:flex;gap:8px;align-items:center">
            <select id="kb-site" onchange="switchKbSite()" style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px">
              ${sites.map(s => `<option value="${s.site_id}" ${s.site_id === siteId ? 'selected' : ''}>${s.persona_name} (${s.domain})</option>`).join('')}
            </select>
            <button class="btn btn-primary btn-sm" onclick="showKbForm()">+ Add Document</button>
          </div>
        </div>

        <div id="kb-docs">
          ${(docs.documents || []).length === 0 ? '<div class="card"><p style="color:var(--text-secondary)">No knowledge base documents yet. Add FAQs, product info, or policies.</p></div>' : ''}
          ${(docs.documents || []).map(d => `
            <div class="card">
              <div class="flex-between">
                <h3>${d.title || 'Untitled'}</h3>
                <div style="display:flex;gap:8px">
                  <button class="btn btn-sm btn-outline" onclick="editKb('${siteId}','${d.id}','${encodeURIComponent(d.title || '')}','${encodeURIComponent(d.content || '')}')">Edit</button>
                  <button class="btn btn-sm btn-danger" onclick="deleteKb('${siteId}','${d.id}')">Delete</button>
                </div>
              </div>
              <p style="font-size:13px;color:var(--text-secondary);margin-top:8px;white-space:pre-wrap">${(d.content || '').substring(0, 300)}${(d.content || '').length > 300 ? '...' : ''}</p>
            </div>
          `).join('')}
        </div>

        <div id="kb-form" class="card hidden"></div>
      `;
    }

    function switchKbSite() {
      const siteId = document.getElementById('kb-site').value;
      currentSite = sites.find(s => s.site_id === siteId);
      renderKnowledge(document.getElementById('main-content'));
    }

    function showKbForm(docId = '', title = '', content = '') {
      const form = document.getElementById('kb-form');
      form.classList.remove('hidden');
      const siteId = document.getElementById('kb-site')?.value || sites[0]?.site_id;
      form.innerHTML = `
        <h3>${docId ? 'Edit Document' : 'Add Document'}</h3>
        <div class="form-group">
          <label>Title</label>
          <input id="kb-title" value="${title}" placeholder="e.g., Shipping Policy" />
        </div>
        <div class="form-group">
          <label>Content</label>
          <textarea id="kb-content" style="min-height:200px" placeholder="Write your FAQ, policy, or product information here...">${content}</textarea>
        </div>
        <div style="display:flex;gap:8px;margin-top:16px">
          <button class="btn btn-primary" onclick="saveKb('${siteId}','${docId}')">${docId ? 'Update' : 'Create'}</button>
          <button class="btn btn-outline" onclick="document.getElementById('kb-form').classList.add('hidden')">Cancel</button>
        </div>
      `;
      form.scrollIntoView({ behavior: 'smooth' });
    }

    function editKb(siteId, docId, title, content) {
      showKbForm(docId, decodeURIComponent(title), decodeURIComponent(content));
    }

    async function saveKb(siteId, docId) {
      const body = {
        title: document.getElementById('kb-title').value,
        content: document.getElementById('kb-content').value,
      };
      if (docId) {
        await api(`/api/sites/${siteId}/knowledge/${docId}`, { method: 'PUT', body });
        toast('Document updated');
      } else {
        await api(`/api/sites/${siteId}/knowledge`, { method: 'POST', body });
        toast('Document added');
      }
      renderKnowledge(document.getElementById('main-content'));
    }

    async function deleteKb(siteId, docId) {
      if (!confirm('Delete this document?')) return;
      await api(`/api/sites/${siteId}/knowledge/${docId}`, { method: 'DELETE' });
      toast('Document deleted');
      renderKnowledge(document.getElementById('main-content'));
    }

    // ========================================
    // Sessions
    // ========================================

    async function renderSessions(el) {
      const data = await api('/api/sites');
      sites = data.sites || [];

      if (sites.length === 0) {
        el.innerHTML = '<h2>Sessions</h2><p>Register a site first.</p>';
        return;
      }

      const siteId = currentSite?.site_id || sites[0].site_id;
      const sessions = await api(`/api/sites/${siteId}/sessions?limit=20`);

      el.innerHTML = `
        <div class="flex-between">
          <h2>Sessions</h2>
          <select id="sess-site" onchange="switchSessSite()" style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px">
            ${sites.map(s => `<option value="${s.site_id}" ${s.site_id === siteId ? 'selected' : ''}>${s.persona_name} (${s.domain})</option>`).join('')}
          </select>
        </div>

        ${(sessions.sessions || []).length === 0 ? '<div class="card"><p style="color:var(--text-secondary)">No sessions recorded yet. Sessions are saved when visitors interact via WebClaw.</p></div>' : `
        <table class="table">
          <thead>
            <tr><th>Session</th><th>User</th><th>Messages</th><th>Duration</th><th>Last Active</th></tr>
          </thead>
          <tbody>
            ${(sessions.sessions || []).map(s => `
              <tr style="cursor:pointer" onclick="viewSession('${siteId}', '${s.session_id || ''}')">
                <td><code>${(s.session_id || s.user_id || '-').substring(0, 12)}...</code></td>
                <td>${s.user_id || '-'}</td>
                <td>${s.message_count || (s.messages || []).length || '-'}</td>
                <td>${s.metadata?.duration_seconds ? Math.round(s.metadata.duration_seconds) + 's' : '-'}</td>
                <td>${s.updated_at ? new Date(s.updated_at * 1000).toLocaleString() : '-'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>`}
      `;
    }

    function switchSessSite() {
      const siteId = document.getElementById('sess-site').value;
      currentSite = sites.find(s => s.site_id === siteId);
      renderSessions(document.getElementById('main-content'));
    }

    async function viewSession(siteId, sessionId) {
      if (!sessionId) return;
      const data = await api(`/api/sites/${siteId}/sessions/${sessionId}`);
      const session = data.session;
      if (!session) { toast('Session not found', 'error'); return; }

      const main = document.getElementById('main-content');
      main.innerHTML = `
        <div style="margin-bottom:16px">
          <button class="btn btn-outline btn-sm" onclick="renderSessions(document.getElementById('main-content'))">← Back</button>
        </div>
        <h2>Session: ${sessionId.substring(0, 16)}...</h2>
        <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px">
          Duration: ${session.metadata?.duration_seconds ? Math.round(session.metadata.duration_seconds) + 's' : 'unknown'} &middot;
          Messages: ${(session.messages || []).length}
        </p>
        <div class="card">
          ${(session.messages || []).map(m => `
            <div style="margin-bottom:12px;padding:8px 12px;border-radius:8px;max-width:80%;${m.role === 'user' ? 'margin-left:auto;background:#fee8e8' : 'background:#f1f3f4'}">
              <div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px">${m.role} &middot; ${m.type} &middot; ${new Date(m.ts * 1000).toLocaleTimeString()}</div>
              <div style="font-size:14px">${m.text || ''}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    // ========================================
    // Settings
    // ========================================

    function renderSettings(el) {
      el.innerHTML = `
        <h2>Settings</h2>
        <div class="card">
          <h3>Gateway</h3>
          <p style="font-size:14px;color:var(--text-secondary)">Connected to: <code>${API_BASE}</code></p>
        </div>
        <div class="card">
          <h3>Version</h3>
          <p style="font-size:14px;color:var(--text-secondary)">WebClaw Gateway v0.2.0</p>
        </div>
      `;
    }

    // ========================================
    // Helpers
    // ========================================

    function copySnippet() {
      const code = document.querySelector('.code-block pre').textContent;
      navigator.clipboard.writeText(code).then(() => toast('Copied to clipboard'));
    }

    // Init
    renderOverview(document.getElementById('main-content'));
  </script>
</body>
</html>
