<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; }

    .header { background: #1a1a2e; color: white; padding: 16px; display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header .badge { font-size: 10px; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; }

    .status-bar { padding: 12px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #eee; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.connected { background: #34a853; }
    .status-dot.disconnected { background: #ea4335; }
    .status-text { font-size: 13px; color: #666; }

    .section { padding: 16px; }
    .section h3 { font-size: 13px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }

    .setting { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .setting label { font-size: 14px; }
    .setting .desc { font-size: 12px; color: #999; margin-top: 2px; }

    .toggle { position: relative; width: 44px; height: 24px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; border-radius: 24px; transition: 0.2s; }
    .toggle .slider:before { content: ''; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.2s; }
    .toggle input:checked + .slider { background: #4285f4; }
    .toggle input:checked + .slider:before { transform: translateX(20px); }

    .input-group { margin-bottom: 14px; }
    .input-group label { display: block; font-size: 13px; margin-bottom: 4px; color: #666; }
    .input-group input { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }

    .btn-primary { width: 100%; background: #4285f4; color: white; border: none; padding: 10px; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .btn-primary:hover { background: #3367d6; }
    .btn-danger { background: #ea4335; }
    .btn-danger:hover { background: #d33426; }

    .footer { padding: 12px 16px; border-top: 1px solid #eee; text-align: center; font-size: 11px; color: #999; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="WebClaw" style="width:24px;height:24px;border-radius:4px">
    <h1>WebClaw</h1>
    <span class="badge">Personal Agent</span>
  </div>

  <div class="status-bar">
    <div class="status-dot disconnected" id="status-dot"></div>
    <span class="status-text" id="status-text">Not connected</span>
  </div>

  <div class="section">
    <h3>Settings</h3>

    <div class="input-group">
      <label>Gateway URL</label>
      <input type="text" id="gateway-url" placeholder="https://gateway.webclaw.dev" />
    </div>

    <div class="setting">
      <div>
        <label>Auto-activate</label>
        <div class="desc">Connect on every page</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="auto-activate" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="setting">
      <div>
        <label>Voice mode</label>
        <div class="desc">Use microphone for voice input</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="voice-mode" checked />
        <span class="slider"></span>
      </label>
    </div>

    <div class="setting">
      <div>
        <label>Send DOM snapshots</label>
        <div class="desc">Let agent see page structure</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="send-dom" checked />
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="section" style="padding-top:0">
    <button class="btn-primary" id="btn-activate">Activate on This Page</button>
  </div>

  <div class="footer">WebClaw v0.1.0 &middot; Gemini Live Agent Challenge</div>

  <script src="popup.js"></script>
</body>
</html>
